---
name: Python type check

on:
    workflow_call:

jobs:
    type-check:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.13"

            - name: Install dependencies
              run: pip install mypy

            - name: Run mypy
              run: mypy .
